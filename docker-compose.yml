version: "3.8"

services:
  db:
    image: postgres:16-alpine
    container_name: j4sistema-db
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: jo14902771
      POSTGRES_DB: j4sistema
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  j4sistema:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: j4sistema
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - NEXT_PUBLIC_SITE_URL=https://j4sistema.com.br
      - DATABASE_URL=postgresql://postgres:jo14902771@db:5432/j4sistema?schema=public
      - JWT_SECRET=${JWT_SECRET:-j4sistema-admin-secret-key-change-in-production}
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3000"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

volumes:
  pgdata: